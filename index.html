<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankieta Personalizowana</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: white;
            transition: background 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #ui-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 1000;
            position: relative;
            max-width: 400px;
        }
        .emoji-overlay {
            position: absolute;
            font-size: 50px;
            pointer-events: none;
            z-index: 500;
        }
        .shape {
            position: absolute;
            pointer-events: none;
            z-index: 400;
            opacity: 0.7;
        }
        .bouncing-text {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            font-size: 24px;
            color: #ff0000;
            pointer-events: none;
            z-index: 2000;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="ui-container">
    <h2 id="question">Pytanie 1: Czy lubisz tryb ciemny (Dark Mode)?</h2>
    <div id="input-zone"></div>
    <div id="button-zone">
        <button onclick="answer('tak')">Tak</button>
        <button onclick="answer('nie')">Nie</button>
    </div>
</div>

<script>
    let step = 1;
    let bouncingTexts = [];

    const questions = [
        "Czy lubisz tryb ciemny (Dark Mode)?",
        "Czy chcesz zobaczyć uśmiechnięte buźki?",
        "Czy podobają Ci się latające figury geometryczne?",
        "Wpisz coś, co ma teraz zacząć latać po ekranie:",
        "Czy chcesz, żeby wszystko zaczęło się trząść?",
        "Czy Twoim zdaniem na stronie jest już wystarczający bałagan?",
        "Wpisz jeszcze jedno słowo do kolekcji:",
        "Czy chcesz, żeby kolory zaczęły wariować?",
        "Czy na pewno chcesz iść dalej? (Pytanie 9/100)",
        "Wpisz imię osoby, którą chcesz przestraszyć tym chaosem:"
    ];

    function answer(val) {
        processEffect(val);
        step++;
        if (step > questions.length) {
            // Jeśli skończą się pytania, generuj losowe
            showQuestion("Pytanie " + step + ": Czy nadal tu jesteś?");
        } else {
            showQuestion(questions[step-1]);
        }
    }

    function showQuestion(text) {
        document.getElementById('question').innerText = text;
        const inputZone = document.getElementById('input-zone');
        const buttonZone = document.getElementById('button-zone');

        // Jeśli pytanie wymaga wpisania tekstu (zawiera "Wpisz")
        if (text.includes("Wpisz")) {
            inputZone.innerHTML = '<input type="text" id="user-input" placeholder="Wpisz tutaj...">';
            buttonZone.innerHTML = '<button onclick="handleInputAnswer()">Zatwierdź i lećmy dalej</button>';
        } else {
            inputZone.innerHTML = '';
            buttonZone.innerHTML = '<button onclick="answer(\'tak\')">Tak</button><button onclick="answer(\'nie\')">Nie</button>';
        }
    }

    function handleInputAnswer() {
        const val = document.getElementById('user-input').value;
        answer(val);
    }

    function processEffect(val) {
        const v = val.toLowerCase();

        // Reakcja na Dark Mode
        if (step === 1 && v === 'tak') {
            document.body.style.background = "#222";
            document.getElementById('ui-container').style.background = "rgba(50,50,50,0.9)";
            document.getElementById('ui-container').style.color = "white";
        }

        // Reakcja na uśmiechy
        if (step === 2 && v === 'tak') {
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'emoji-overlay';
                e.innerText = '😊';
                e.style.left = Math.random() * 90 + 'vw';
                e.style.top = Math.random() * 90 + 'vh';
                document.body.appendChild(e);
            }, 1000);
        }

        // Reakcja na figury
        if (step === 3 && v === 'tak') {
            for(let i=0; i<15; i++) createShape();
        }

        // Reakcja na wpisany tekst (DVD Bounce)
        if (step === 4 || step === 7 || step === 10) {
            createBouncingText(val);
        }

        // Trzęsienie ziemi
        if (step === 5 && v === 'tak') {
            document.getElementById('ui-container').style.animation = "shake 0.2s infinite";
        }
    }

    // --- FUNKCJE EFEKTÓW ---

    function createShape() {
        const s = document.createElement('div');
        s.className = 'shape';
        const size = Math.random() * 50 + 20;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.background = `hsl(${Math.random()*360}, 70%, 50%)`;
        s.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
        document.body.appendChild(s);

        let posX = Math.random() * window.innerWidth;
        let posY = Math.random() * window.innerHeight;
        let velX = (Math.random() - 0.5) * 5;
        let velY = (Math.random() - 0.5) * 5;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - size) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - size) velY *= -1;
            s.style.left = posX + 'px';
            s.style.top = posY + 'px';
            requestAnimationFrame(move);
        }
        move();
    }

    function createBouncingText(txt) {
        const t = document.createElement('div');
        t.className = 'bouncing-text';
        t.innerText = txt;
        document.body.appendChild(t);
        
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 30);
        let dx = 3;
        let dy = 3;

        function animate() {
            x += dx; y += dy;
            if (x <= 0 || x >= window.innerWidth - t.offsetWidth) { dx *= -1; t.style.color = getRandomColor(); }
            if (y <= 0 || y >= window.innerHeight - t.offsetHeight) { dy *= -1; t.style.color = getRandomColor(); }
            t.style.left = x + 'px';
            t.style.top = y + 'px';
            requestAnimationFrame(animate);
        }
        animate();
    }

    function getRandomColor() {
        return `hsl(${Math.random()*360}, 100%, 50%)`;
    }
</script>

<style>
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        40% { transform: translate(3px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        80% { transform: translate(3px, -1px) rotate(1deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
</style>

</body>
</html>
